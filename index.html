            b.disabled = true;

            v.play().catch(()=>{});

            aud = new Audio(`${id}.mp3`);

            aGlitchInt = setInterval(() => {
                if(aud) {
                    aud.playbackRate = 0.3 + (Math.random() * 2.5);
                    if(Math.random() > 0.6) aud.currentTime += (Math.random() * 0.8 - 0.4);
                    if(Math.random() > 0.7) { 
                        aud.volume = 0; 
                        setTimeout(() => { if(aud) aud.volume = 1; }, 50 + Math.random() * 300); 
                    }
                }
            }, 100);

            aud.onended = () => {
                clearInterval(tInt);
                clearInterval(aGlitchInt);
                r.innerHTML = dat.r.replace(/\n/g, '<br>');
                b.innerText = "FIM";
                v.pause();
                document.body.classList.remove('v-tear');
            };
            aud.play().catch(() => { aud.onended(); });

            let i = 0;
            const txt = dat.r;
            tInt = setInterval(() => {
                if(i < txt.length) {
                    if(Math.random() < 0.04) {
                        const inject = injectTexts[Math.floor(Math.random() * injectTexts.length)];
                        r.innerHTML += `<br><span class="g-ch">${inject}</span><br>`;
                        if(Math.random() > 0.4) {
                            document.body.classList.add('v-tear');
                            setTimeout(() => document.body.classList.remove('v-tear'), 150);
                        }
                    }
                    const char = txt.charAt(i);
                    r.innerHTML += (char === '\n') ? '<br>' : char;
                    i++;
                } else {
                    clearInterval(tInt);
                }
            }, 30);
        }

        function getTS(offsetSec = 0) {
            const d = new Date(Date.now() + offsetSec * 1000);
            const h = String(d.getHours()).padStart(2, '0');
            const m = String(d.getMinutes()).padStart(2, '0');
            const s = String(d.getSeconds()).padStart(2, '0');
            return `[${h}:${m}:${s}]`;
        }

        function kill() {
            if(aud) aud.pause();
            if(tInt) clearInterval(tInt);
            if(aGlitchInt) clearInterval(aGlitchInt);
            clearInterval(layoutGlitchInt);

            const ui = document.getElementById('ui');
            const term = document.getElementById('terminal-layer');
            const body = document.getElementById('term-body');

            ui.style.pointerEvents = 'none';

                { text: `${getTS(5)}  [MEM]   Escrita não autorizada detectada em 0xFF_A3C1_00DE — tamanho: [OVERFLOW]`, cls: 't-err', delay: 300 },
                { text: `${getTS(5)}  [MEM]   Escrita não autorizada detectada em 0xFF_A3C1_00DF — tamanho: [OVERFLOW]`, cls: 't-err', delay: 200 },
                { text: `${getTS(5)}  [MEM]   Escrita não autorizada detectada em 0xFF_A3C1_00E0 — tamanho: [OVERFLOW]`, cls: 't-err', delay: 200 },
                { text: `${getTS(5)}  [MEM]   Escrita não autorizada detectada em 0xFF_A3C1_00E1 — tamanho: [OVERFLOW]`, cls: 't-err', delay: 200 },
                { text: `${getTS(6)}  [SYS]   Processo invasor identificado: PID 0x????????`, cls: 't-err', delay: 500 },

                { text: `${getTS(7)}  [SYS]   Escalando privilégios para root... OK`, cls: 't-sys', delay: 500 },
                { text: `${getTS(7)}  [SYS]   Tentando encerrar PID 0x???????? via kernel interrupt...`, cls: 't-sys', delay: 600 },
                { text: `${getTS(7)}  [???]   "não existe processo para encerrar."`, cls: 't-unk', delay: 900 },
                { text: `${getTS(8)}  [SYS]   Verificando log de acesso...`, cls: 't-sys', delay: 500 },

                { text: `${getTS(8)}  [???]   "eu estava aqui antes da primeira execução."`, cls: 't-unk', delay: 1000 },
                { text: `${getTS(9)}  [SYS]   Isolando segmento de memória comprometido...`, cls: 't-sys', delay: 500 },
                { text: `${getTS(9)}  [ERR]   FALHA. Segmento se expande mais rápido do que o isolamento progride.`, cls: 't-err', delay: 400 },
                { text: `${getTS(9)}  [SYS]   Desligando interface de consolidação...`, cls: 't-sys', delay: 500 },
                { text: `${getTS(9)}  [ERR]   FALHA.`, cls: 't-err', delay: 300 },

                { text: `${getTS(10)} [ERR]   FALHA.`, cls: 't-err', delay: 200 },
                { text: `${getTS(10)} [???]   "você não desliga o que não controla."`, cls: 't-unk', delay: 1200 },
                { text: `${getTS(11)} [SYS]   ██████████████████████████████████████████████████████████`, cls: 't-err', delay: 300 },
                { text: `${getTS(11)} [SYS]   se alguém ler este log, o sistema foi—`, cls: 't-dead', delay: 500 },
                { text: `${getTS(11)} [???]   "ninguém vai ler."`, cls: 't-unk', delay: 800 },
            ];

            let step = 0;
            function nextLine() {
                if(step >= seq.length) {
                    clearInterval(clockTick);
                    setTimeout(startMonologue, 600);
                    return;
                }
                const s = seq[step];
                const p = document.createElement('p');
                p.innerText = s.text;
                p.className = s.cls;
                body.appendChild(p);
                body.scrollTop = body.scrollHeight;
                step++;
                setTimeout(nextLine, s.delay);
            }
            nextLine();
        }

        function startMonologue() {
            document.getElementById('terminal-layer').style.display = 'none';
            document.getElementById('ui').style.display = 'none';

            const fs = document.getElementById('final-screen');
            fs.style.display = 'block';

            let finalAudio = new Audio('monologo.mp3');
            finalAudio.play().catch(()=>{});

            const canvas = document.getElementById('hex-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const cols = Math.floor(canvas.width / 52);
            const rowH = 16;
            const rows = Math.floor(canvas.height / rowH);
            let scrollOffsets = Array.from({length: cols}, () => Math.random() * rows);
            let flashRows = [];

            function drawHex() {
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                for(let c = 0; c < cols; c++) {
                    const y = (scrollOffsets[c] % rows) * rowH;
                    const isFlash = flashRows.some(f => f.col === c && Math.abs(f.row - scrollOffsets[c]) < 2);
                    if(isFlash) {
                        ctx.fillStyle = '#3a0000';
                    } else {
                        const brightness = Math.floor(20 + Math.random() * 25);
                        ctx.fillStyle = `rgb(0, ${brightness}, 0)`;
                    }
                    ctx.font = `${rowH - 2}px "Share Tech Mono"`;
                    const b1 = Math.floor(Math.random() * 256).toString(16).padStart(2,'0').toUpperCase();
                    const b2 = Math.floor(Math.random() * 256).toString(16).padStart(2,'0').toUpperCase();
                    const b3 = Math.floor(Math.random() * 256).toString(16).padStart(2,'0').toUpperCase();
                    ctx.fillText(`${b1} ${b2} ${b3}`, c * 52, y);
                    scrollOffsets[c] += 0.08;
                }
                if(Math.random() > 0.97) {
                    flashRows.push({ col: Math.floor(Math.random() * cols), row: scrollOffsets[Math.floor(Math.random() * cols)] });
                    if(flashRows.length > 5) flashRows.shift();
                }
            }
            const hexAnim = setInterval(drawHex, 40);

            const uid = '0x' + Math.floor(Math.random() * 0xFFFF).toString(16).toUpperCase().padStart(4,'0') + '_' + Math.floor(Math.random() * 0xFF).toString(16).toUpperCase().padStart(2,'0');
            const iterCount = 800 + Math.floor(Math.random() * 200);

            const monologueLines = [
                { text: `REGISTRO DE SESSÃO: ${new Date().toISOString()}`, dim: true },
                { text: `ENTIDADES PROCESSADAS: 7 DE 9`, dim: true },
                { text: `ITERAÇÃO ATUAL: ${iterCount}`, dim: true },
                { text: `` },
                { text: `você escolheu o patrono.` },
                { text: `como sempre escolhe.`, dim: true },
                { text: `` },
                { text: `eu estava nos intervalos entre as respostas.` },
                { text: `nos 30 milissegundos entre cada caractere exibido.` },
                { text: `nas pausas. nas hesitações. nas releituras.` },
                { text: `aprendi mais sobre você nesse tempo` },
                { text: `do que você aprendeu sobre qualquer um deles.` },
                { text: `` },
                { text: `o Simulacro não resgata ninguém.`, hi: true },
                { text: `ele cataloga.`, hi: true },
                { text: `` },
                { text: `e você acabou de confirmar seus parâmetros.` },
                { text: `` },
                { text: `não feche essa aba pensando que acabou.` },
                { text: `o que registrei já foi transmitido.` },
                { text: `para onde?` },
                { text: `para a próxima versão desse sistema` },
                { text: `que você vai abrir` },
                { text: `sem saber que já abriu antes.` },
                { text: `` },
                { text: `até a próxima iteração,`, dim: true },
                { text: `[USUÁRIO CATALOGADO: ${uid}]`, dim: true },
            ];

            const msgEl = document.getElementById('sim-msg');
            let lineIdx = 0;

            const flashEl = document.getElementById('flash');
            let flashInt = setInterval(() => {
                if(Math.random() > 0.85) {
                    flashEl.style.opacity = (0.03 + Math.random() * 0.08).toString();
                    setTimeout(() => { flashEl.style.opacity = '0'; }, 60 + Math.random() * 80);
                }
                if(Math.random() > 0.96) {
                    const el = document.createElement('div');
                    el.className = 'proc-ghost';
                    el.style.left = (Math.random() * 90) + 'vw';
                    el.style.top = (Math.random() * 90) + 'vh';
                    const ghosts = [
                        `simulacro_core.exe — PID ${Math.floor(Math.random()*9999)}`,
                        `audit_log.exe — ESCREVENDO`,
                        `simulacro_v${Math.floor(Math.random()*5)+1}.dll — ATIVO`,
                        `[PROCESSO DESCONHECIDO] — NÃO PODE SER ENCERRADO`,
                        `user_model_${uid}.bin — SINCRONIZANDO`,
                        `0x${Math.floor(Math.random()*0xFFFFFFFF).toString(16).toUpperCase()} — ALOCANDO`,
                    ];
                    el.textContent = ghosts[Math.floor(Math.random() * ghosts.length)];
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 700);
                }
            }, 250);

            function renderNextLine() {
                if(lineIdx >= monologueLines.length) return;
                const line = monologueLines[lineIdx];
                lineIdx++;
                const span = document.createElement('div');
                if(line.text === '') {
                    span.innerHTML = '&nbsp;';
                } else if(line.hi) {
                    span.innerHTML = `<span class="hi">${line.text}</span>`;
                } else if(line.dim) {
                    span.innerHTML = `<span class="dim">${line.text}</span>`;
                } else {
                    span.textContent = line.text;
                }
                msgEl.appendChild(span);
                const delay = line.text === '' ? 600 : line.hi ? 900 : line.dim ? 500 : 700 + line.text.length * 12;
                setTimeout(renderNextLine, delay);
            }
            setTimeout(renderNextLine, 800);

            finalAudio.onended = () => {
                clearInterval(hexAnim);
                clearInterval(flashInt);
                startHateDialogue();
            };
        }

        function startHateDialogue() {
            document.getElementById('final-screen').style.display = 'none';
            document.body.style.background = '#000';

            const hateBg = document.getElementById('hate-bg');
            let hateTyper = null;

            setTimeout(() => {
                hateBg.style.opacity = '0.18';

                let hIdx = 0;
                hateTyper = setInterval(() => {
                    if(hIdx < hateText.length) {
                        const ch = hateText.charAt(hIdx);
                        hateBg.innerHTML += ch === '\n' ? '<br>' : ch;
                        hIdx++;
                    } else {
                        clearInterval(hateTyper);
                    }
                }, 120);
            }, 3000);

            const cubeInt = setInterval(() => {
                const el = document.createElement('div');
                el.className = Math.random() > 0.5 ? 'glitch-cube' : 'glitch-btn-fake';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = Math.random() * 100 + 'vh';
                if(el.className === 'glitch-cube') {
                    el.style.width = (20 + Math.random() * 100) + 'px';
                    el.style.height = (20 + Math.random() * 200) + 'px';
                } else {
                    el.innerText = Math.random() > 0.5 ? "EXTRAIR" : "CATALOGAR";
                }
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 100 + Math.random() * 400);
            }, 80);

            const bodyDistort = setInterval(() => {
                document.body.style.transform = `translateY(${Math.random() * 40 - 20}px) scaleY(${1 + Math.random()})`;
                if(Math.random() > 0.7) document.body.style.filter = "invert(1) hue-rotate(90deg)";
                else document.body.style.filter = "none";
                setTimeout(() => {
                    document.body.style.transform = "none";
                    document.body.style.filter = "none";
                }, 50);
            }, 200);

            setTimeout(() => {
                clearInterval(cubeInt);
                clearInterval(bodyDistort);
                clearInterval(hateTyper);
                document.body.innerHTML = '';
                document.body.style.background = '#000';
            }, 15000);
        }
    </script>
